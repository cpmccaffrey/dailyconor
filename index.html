<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Conor</title>
  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#fafaf9;
      color:#111;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:24px;
    }
    .card{
      max-width:700px;
      background:white;
      border:1px solid #e5e5e5;
      border-radius:28px;
      padding:48px;
      box-shadow:0 10px 30px rgba(0,0,0,.04);
    }
    .eyebrow{
      color:#666;
      font-size:14px;
      margin-bottom:20px;
    }
    h1{
      font-size:48px;
      margin:0 0 20px 0;
      line-height:1.05;
    }
    p{
      color:#444;
      line-height:1.7;
      font-size:18px;
    }
    a.button{
      display:inline-block;
      margin-top:24px;
      background:#111;
      color:white;
      padding:14px 22px;
      border-radius:999px;
      text-decoration:none;
      font-weight:600;
    }
    .meta{
      margin-top:28px;
      color:#777;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Daily Conor · Cool Thing #1</div>
    <h1>a16z Infra Reading List</h1>
    <p>
      Curated reading list from the a16z infra team — full of sci-fi,
      systems thinking, and intellectually interesting rabbit holes.
    </p>
    <a
      class="button"
      href="https://a16z-infra.github.io/reading-list/"
      target="_blank"
    >
      Open Link
    </a>
    <div class="meta">
      Source: Conor · Added: May 6, 2026
    </div>
  </div>
</body>
</html>
