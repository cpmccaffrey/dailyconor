<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Conor</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafaf9;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      max-width: 760px;
      width: 100%;
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 28px;
      padding: 48px;
      box-shadow: 0 10px 30px rgba(0,0,0,.04);
    }

    .eyebrow {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 48px;
      margin: 0 0 20px 0;
      line-height: 1.05;
      letter-spacing: -1px;
    }

    .description {
      color: #444;
      line-height: 1.7;
      font-size: 18px;
      margin-bottom: 24px;
    }

    .meta {
      color: #777;
      font-size: 14px;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .tag {
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      color: #555;
      background: #fafafa;
    }

    .button {
      display: inline-block;
      margin-right: 10px;
      background: #111;
      color: white;
      padding: 14px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .secondary {
      background: white;
      color: #111;
      border: 1px solid #ccc;
    }

    @media (max-width: 700px) {
      .card {
        padding: 28px;
      }

      h1 {
        font-size: 34px;
      }

      .button {
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow" id="eyebrow">Daily Conor</div>
    <h1 id="title"></h1>
    <div class="description" id="description"></div>
    <div class="meta" id="meta"></div>
    <div class="tags" id="tags"></div>

    <a class="button" id="link" href="#" target="_blank">
      Open Link
    </a>

    <button class="button secondary" onclick="showAnother()">
      Show me another
    </button>
  </div>

  <script>
    const coolThings = [
      {
        title: "a16z Infra Reading List",
        url: "https://a16z-infra.github.io/reading-list/",
        category: "Reading",
        tags: ["books", "technology", "infrastructure", "learning"],
        description:
          "Curated reading list from the a16z infra team—full of sci-fi, systems thinking, and intellectually interesting rabbit holes.",
        source: "Conor",
        dateAdded: "May 6, 2026"
      },
      {
        title: "Richard Feynman",
        url: "https://en.wikipedia.org/wiki/Richard_Feynman",
        category: "People",
        tags: ["physics", "curiosity", "learning", "scientist"],
        description:
          "Nobel Prize-winning physicist known for deep intuition, playful thinking, and unusually clear explanations of complex ideas.",
        source: "Conor",
        dateAdded: "May 6, 2026"
      }
    ];

    function render(item) {
      document.getElementById("title").textContent = item.title;
      document.getElementById("description").textContent = item.description;
      document.getElementById("meta").textContent =
        `${item.category} · Source: ${item.source} · Added: ${item.dateAdded}`;
      document.getElementById("link").href = item.url;

      const tagsContainer = document.getElementById("tags");
      tagsContainer.innerHTML = "";

      item.tags.forEach(tag => {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = tag;
        tagsContainer.appendChild(span);
      });
    }

    function showAnother() {
      const item = coolThings[Math.floor(Math.random() * coolThings.length)];
      render(item);
    }

    showAnother();
  </script>
</body>
</html>
